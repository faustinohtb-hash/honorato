<!DOCTYPE html>
<html lang="es">
<head>

    <style id="dynamicPrintStyles"></style>

    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            padding-bottom: 80px; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- ESTILOS DEL FOOTER --- */
        .footer-custom {
            margin-top: auto; 
            padding: 20px 0;
            text-align: center;
            color: #6c757d; 
            font-size: 0.85rem;
            border-top: 1px solid #dee2e6;
            background-color: white;
            margin-top: 40px;
        }

        /* --- ESTILOS DEL HEADER (ACTUALIZADO PARA BOTÓN INICIO) --- */
        .header {
            background-color: #0d6efd;
            color: white;
            padding: 15px 20px; /* Padding lateral para espacio */
            border-radius: 10px;
            margin-bottom: 20px;
            
            display: flex;
            align-items: center; 
            /* CAMBIO: space-between para separar Logo - Texto - Botón */
            justify-content: space-between; 
            gap: 20px;
        }

        .header-logo-img {
            height: 70px;       
            width: auto;
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 5px;
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .header-text-content {
            text-align: center;
            flex-grow: 1; /* Ocupa el centro */
        }

        /* Botón de regreso */
        .btn-home {
            white-space: nowrap; /* Evita que el texto se rompa en varias líneas */
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column; 
                text-align: center;
                gap: 15px;
            }
            .header-logo-img {
                height: 60px;
            }
            .header-text-content {
                order: -1; /* Texto arriba en móvil */
            }
            .btn-home {
                width: 100%; /* Botón ancho completo en móvil */
            }
        }
        /* -------------------------------------------------------- */
        
        .selection-panel {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .planning-container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            min-height: 300px;
        }

        .nav-bar-container {
            background-color: #f1f3f5;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .section-title {
            background-color: #e9ecef;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #495057;
        }
        .steam-phase {
            background-color: #e7f1ff;
            border-left: 4px solid #0d6efd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 5px 5px 0;
        }

        .vista-oficial {
            font-family: 'Times New Roman', Times, serif !important;
            font-size: 12pt;
            line-height: 1.25;
            color: #000000 !important;
            background-color: white;
            padding: 20px;
            border: 2px solid #000; 
            margin: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .oficial-header-table {
            width: 100%;
            border-collapse: collapse;
            border-bottom: 1px solid #000;
            margin-bottom: 15px;
        }
        .oficial-header-table td {
            padding: 2px 5px;
            border: none;
            vertical-align: middle;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .header-container {
            position: relative; 
            margin-bottom: 15px;
            min-height: 80px; 
        }
        .logo-absoluto {
            position: absolute;
            top: 5px; 
            right: 20px;
            height: 70px; 
            width: auto;
            max-width: 110px;
            object-fit: contain; 
            z-index: 10;
        }

        .oficial-info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 11pt;
        }
        .oficial-info-table td {
            border: 1px solid #000;
            padding: 5px 8px;
            vertical-align: middle;
        }
        .oficial-info-table .label-cell {
            background-color: #e9ecef !important; 
            font-weight: bold;
            width: 15%;
        }

        .oficial-box {
            border: 1px solid #000;
            padding: 8px;
            margin-bottom: 10px;
            min-height: 40px;
        }

        .oficial-phase-box {
            border: 1px solid #000;
            margin-bottom: 15px;
            page-break-inside: avoid;
        }
        
        .oficial-phase-header {
            background-color: #e9ecef !important;
            border-bottom: 1px solid #000;
            padding: 5px 8px;
            font-weight: bold;
            font-size: 11pt;
        }
        
        .phase-title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        
        .phase-title-text {
            font-weight: bold;
            text-transform: uppercase;
        }

        .oficial-phase-subheader {
            font-size: 10pt;
            font-style: italic;
            margin-bottom: 5px;
            color: #444;
        }

        .oficial-phase-body {
            padding: 8px;
            font-size: 11pt;
        }

        .oficial-signatures {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }
        .sign-line {
            border-top: 1px solid #000;
            width: 45%;
            text-align: center;
            padding-top: 5px;
            font-size: 10pt;
        }

        .month-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .month-option {
            border-radius: 50px; border: 1px solid #dee2e6; background-color: white;
            color: #495057; padding: 8px 20px; cursor: pointer; transition: all 0.3s ease;
            font-size: 0.9rem; user-select: none; text-align: center; min-width: 80px;
        }
        .month-option:hover { background-color: #e9ecef; transform: translateY(-1px); }
        .month-option.selected {
            background-color: #0d6efd; color: white; border-color: #0d6efd;
            box-shadow: 0 4px 6px rgba(13, 110, 253, 0.3); font-weight: 500;
        }
        
        #loadingIndicator { display: none; padding: 20px; margin-bottom: 20px; }
        .no-print { display: block; }

        @media print {
            body { 
                background-color: white; 
                padding: 0; 
                padding-bottom: 0; 
                display: block; 
            }
            .no-print { display: none !important; }
            .planning-container, .vista-oficial { 
                box-shadow: none; padding: 20px; margin: 0; width: 100%;
                border: 2px solid #000;
            }
            .vista-oficial { font-size: 11pt; }
            .oficial-info-table .label-cell, .oficial-phase-header {
                -webkit-print-color-adjust: exact; color-adjust: exact;
                background-color: #e9ecef !important;
            }
            .header-container { min-height: 80px; }
            .logo-absoluto { position: absolute; top: 5px; right: 10px; } 
            @page { size: letter landscape; margin: 0.5cm; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ENCABEZADO CON BOTÓN DE INICIO -->
        <div class="header no-print">
            <!-- Logo de la escuela -->
            <img src="https://faustinohtb-hash.github.io/honorato/imagenes/logo_escuela.png" class="header-logo-img" alt="Logo Escuela">
            
            <!-- Texto centrado -->
            <div class="header-text-content">
                <h1 class="h4 m-0"><i class="bi bi-journal-text"></i> Sistema de Planeación</h1>
                <p class="mb-0 small opacity-75">Seleccione los datos para generar la planeación</p>
            </div>

            <!-- BOTÓN REGRESAR A INICIO (Derecha) -->
            <a href="https://faustinohtb-hash.github.io/honorato/index.html" class="btn btn-light btn-home rounded-pill px-3 shadow-sm fw-bold">
                <i class="bi bi-house-door-fill text-primary"></i> Inicio
            </a>
        </div>

        <div class="selection-panel no-print">
            <div id="loadingIndicator" class="text-center">
                <div class="progress mb-2" style="height: 25px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%">0%</div>

            <div id="selectionForm">

                    <div class="col-md-6 mb-3">

                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="disciplina" class="form-label">Disciplina</label>

                            <option value="Física">Física</option>
                            <option value="Química">Química</option>
                            <option value="Geografía">Geografía</option>
                            <option value="Historia">Historia</option>
                            <option value="Formación Cívica y Ética">Formación Cívica y Ética</option>
                            <option value="Tecnología">Tecnología</option>
                            <option value="Educación Física">Educación Física</option>
                            <option value="Tutoría">Tutoría</option>
                            <option value="Integración Curricular">Integración Curricular</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 mb-3">
                        <label for="docente" class="form-label">Docente</label>

                            <option value="">Cargando lista de docentes...</option>

                <div class="mb-4">

                    <input type="hidden" id="selectedMonth" value="">

                <button class="btn btn-primary w-100" id="cargarPlaneacion">

                </button>
            </div>
        </div>

        <div class="planning-container" id="planningContainer">
            <div class="text-center text-muted py-5">
                <i class="bi bi-journal-text" style="font-size: 3rem;"></i>
                <h4 class="mt-3">Esperando selección...</h4>
            </div>
        </div>

        <!-- FOOTER PERSONALIZADO -->
        <footer class="footer-custom no-print">
            <p class="mb-0">© 2025-2026 Sistema de Gestión Escolar | Escuela Secundaria Profesor Honorato Tlaseca Barrera | Todos los derechos reservados</p>
        </footer>
    </div>

    <button class="btn btn-primary no-print" id="printBtn" style="position: fixed; bottom: 20px; right: 20px; display: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <i class="bi bi-printer"></i> Imprimir
    </button>
    <button class="btn btn-danger no-print" id="downloadPdfBtn" style="position: fixed; bottom: 20px; right: 170px; display: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <i class="bi bi-file-earmark-pdf-fill"></i> PDF
    </button>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx48tvW1z6hSJEo4d_iE3vmM6dseaoAkmVZeeZWk8ZNERaUa5QDFytf-09st1vqryXKGQ/exec";
        const TEACHERS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwE-4UUgzftAU6zSusPpGzkExB4OqGuXuENgi22k5T5yrQat6JItJwFVBBAgjuEXfzhFQ/exec";
        
        const meses = ["Septiembre", "Octubre", "Noviembre", "Diciembre", "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio"];
        let allData = [];
        let allTeachers = []; 
        let selectedMonthBtn = null;
        let progressInterval = null;

        let matchedResults = [];
        let currentMatchIndex = 0;

        const DATA_INSTITUCIONAL = {
            subsecretaria: "SUBSECRETARÍA DE EDUCACIÓN BÁSICA Y MEDIA SUPERIOR",
            direccion: "DIRECCIÓN DE SECUNDARIAS GENERALES",
            escuela: "ESCUELA SECUNDARIA 'HONORATO TLASECA BARRERA'",
            sector: "JEFATURA DE SECTOR 03 ESTATAL SUPERVISIÓN ESCOLAR ZONA 020",
            cct: "C.C.T. 21EES0265J HUEHUETLÁN EL CHICO, PUE.",
            docente_base: "DOCENTE POR ASIGNAR", 
        };

        function iniciarCarga() {
            const container = document.getElementById('loadingIndicator');
            const bar = document.getElementById('progressBar');
            const form = document.getElementById('selectionForm');

            container.style.display = 'block';
            form.style.opacity = '0.4';
            form.style.pointerEvents = 'none'; 

            let percent = 0;
            bar.style.width = '0%';
            bar.innerText = '0%';
            bar.setAttribute('aria-valuenow', 0);

            if (progressInterval) clearInterval(progressInterval);

            progressInterval = setInterval(() => {
                let step = 0;
                if (percent < 15) {
                    step = (Math.random() * 0.5) + 1.2;
                } else if (percent < 40) {
                    step = (Math.random() * 0.2) + 0.7;
                } else {
                    step = (Math.random() * 0.1) + 0.3;
                }
                percent += step;
                if (percent > 98) percent = 98; 
                bar.style.width = percent + '%';
                bar.innerText = Math.floor(percent) + '%';
                bar.setAttribute('aria-valuenow', percent);
            }, 150); 
        }

        function finalizarCarga() {
            const container = document.getElementById('loadingIndicator');
            const bar = document.getElementById('progressBar');
            const form = document.getElementById('selectionForm');

            clearInterval(progressInterval);
            bar.style.width = '100%';
            bar.innerText = '100%';
            bar.setAttribute('aria-valuenow', 100);

            setTimeout(() => {
                container.style.display = 'none';
                form.style.opacity = '1';
                form.style.pointerEvents = 'auto';
            }, 500);
        }

        function formatearTextoFase(texto) {
            if (!texto) return "No definido";
            let txt = texto;
            txt = txt.replace(/Sesión (\d+):/g, '<br><strong>Sesión $1:</strong>');
            txt = txt.replace(/ - /g, '<br>- ');
            txt = txt.replace(/\. -/g, '.<br>-');
            txt = txt.replace(/(•|\*)/g, '<br>$1');
            return txt;
        }

        function normalizeText(text) {
            if (!text) return "";
            let txt = text.toString().toLowerCase();
            txt = txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            txt = txt.replace(/[^a-z0-9\s]/g, "");
            txt = txt.replace(/\s+/g, ' ').trim();
            return txt;
        }

        function configPrintSettings(esOficial) {
            const styleTag = document.getElementById('dynamicPrintStyles');
            if (esOficial) {
                styleTag.innerHTML = `@media print { @page { size: letter landscape; margin: 0.5cm; } body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }`;
            } else {
                styleTag.innerHTML = `@media print { @page { size: auto; margin: 1cm; } }`;
            }
        }

        function getNavHtml() {
            if (matchedResults.length <= 1) return "";
            const prevDisabled = currentMatchIndex === 0 ? 'disabled' : '';
            const nextDisabled = currentMatchIndex === matchedResults.length - 1 ? 'disabled' : '';

            return `
                <div class="no-print nav-bar-container row align-items-center">
                    <div class="col-4 text-end">
                        <button class="btn btn-outline-secondary btn-sm" onclick="navegar(-1)" ${prevDisabled}>
                            <i class="bi bi-chevron-left"></i> Anterior
                        </button>
                    </div>
                    <div class="col-4 text-center fw-bold text-primary">
                        ${currentMatchIndex + 1} / ${matchedResults.length}
                    </div>
                    <div class="col-4 text-start">
                        <button class="btn btn-outline-secondary btn-sm" onclick="navegar(1)" ${nextDisabled}>
                            Siguiente <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function navegar(direccion) {
            if (direccion === 1 && currentMatchIndex < matchedResults.length - 1) {
                currentMatchIndex++;
            } else if (direccion === -1 && currentMatchIndex > 0) {
                currentMatchIndex--;
            }
            const docenteSeleccionado = document.getElementById('docente').value.trim();
            mostrarPlaneacion(matchedResults[currentMatchIndex], docenteSeleccionado);
            document.getElementById('planningContainer').scrollIntoView({ behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', function() {
            inicializarInterfaz();
            iniciarCarga(); 
            cargarDatosDesdeSheet();
            cargarDocentes(); 
            
            document.getElementById('cargarPlaneacion').addEventListener('click', () => realizarBusqueda(true));
            document.getElementById('grado').addEventListener('change', () => realizarBusqueda(false));
            document.getElementById('disciplina').addEventListener('change', () => realizarBusqueda(false));
            document.getElementById('docente').addEventListener('change', () => realizarBusqueda(false)); 
            document.getElementById('printBtn').addEventListener('click', () => window.print());
            document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                alert("En el diálogo, selecciona 'Guardar como PDF'.");
                window.print();
            });
        });

        async function cargarDocentes() {
            const select = document.getElementById('docente');
            try {
                allTeachers = await fetchJson(TEACHERS_SCRIPT_URL);
                select.innerHTML = '<option value="">Seleccionar docente</option>';
                allTeachers.forEach(t => {
                    if (t.nombre) {
                        const opt = document.createElement('option');
                        opt.value = t.nombre;
                        opt.textContent = t.nombre;
                        select.appendChild(opt);
                    }
                });
            } catch (error) {
                console.error("Error cargando docentes:", error);
                select.innerHTML = '<option value="">Error al cargar docentes (Ver CORS en backend)</option>';
            }
        }

        function inicializarInterfaz() {
            const monthSelector = document.getElementById('monthSelector');
            const selectedMonthInput = document.getElementById('selectedMonth');
            const mesesJS = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const hoy = new Date();
            const nombreMesActual = mesesJS[hoy.getMonth()];

            function selectMonth(element, mes) {
                if (selectedMonthBtn) selectedMonthBtn.classList.remove('selected');
                element.classList.add('selected');
                selectedMonthBtn = element;
                selectedMonthInput.value = mes;
                realizarBusqueda(false);
            }

            meses.forEach(mes => {
                const btn = document.createElement('div');
                btn.className = 'month-option';
                btn.textContent = mes;
                if (mes === nombreMesActual) selectMonth(btn, mes);
                btn.onclick = () => selectMonth(btn, mes);
                monthSelector.appendChild(btn);
            });
        }

        async function fetchJson(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Error de red: ${response.status} ${response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                console.error("Error en fetchJson:", error);
                throw error;
            }
        }

        async function cargarDatosDesdeSheet() {
            try {
                allData = await fetchJson(SCRIPT_URL);
                if(allData.length > 0) realizarBusqueda(false);
            } catch (error) { 
                console.error(error); 
                finalizarCarga(); 
            }
            finally {
                finalizarCarga();
            }
        }

        function realizarBusqueda(isManual) {
            const grado = document.getElementById('grado').value.trim();
            const disciplina = document.getElementById('disciplina').value.trim();
            const mesSeleccionado = document.getElementById('selectedMonth').value.trim();
            const container = document.getElementById('planningContainer');

            if (!allData.length) return;
            if (!grado || !disciplina || !mesSeleccionado) return;

            const normGrado = normalizeText(grado);
            const normDisciplina = normalizeText(disciplina);
            const normMes = normalizeText(mesSeleccionado);

            matchedResults = allData.filter(row => {
                const rGrado = normalizeText(row["Grado"]);
                const rDisc = normalizeText(row["Disciplina"]);
                const rFecha = normalizeText(row["Fecha"]);
                return (rGrado.includes(normGrado) || normGrado.includes(rGrado)) &&
                       (rDisc === normDisciplina) && 
                       rFecha.includes(normMes);
            });

            if (matchedResults.length === 0) {
                container.innerHTML = `<div class="alert alert-warning text-center"><h4>No se encontraron datos para: ${grado} - ${disciplina} - ${mesSeleccionado}</h4></div>`;
                ocultarBotones();
                return;
            }

            if (isManual) {
                currentMatchIndex = 0;
            }

            const docenteSeleccionado = document.getElementById('docente').value.trim();
            mostrarPlaneacion(matchedResults[currentMatchIndex], docenteSeleccionado);
        }

        function ocultarBotones() {
            document.getElementById('printBtn').style.display = 'none';
            document.getElementById('downloadPdfBtn').style.display = 'none';
        }
        
        function mostrarPlaneacion(data, docenteSeleccionado) {
            const val = (keyInput) => {
                const normalizedInput = normalizeText(keyInput);
                const foundKey = Object.keys(data).find(k => normalizeText(k) === normalizedInput);
                return foundKey ? data[foundKey].trim() : "";
            };

            const container = document.getElementById('planningContainer');
            const campoFormativo = val('Campo Formativo');
            const normCampo = normalizeText(campoFormativo);
            
            const esLenguajes = normCampo.includes('lenguajes');
            const esCientifico = normCampo.includes('saberes') && normCampo.includes('cientifico');
            const esHumano = normCampo.includes('de lo humano') && normCampo.includes('comunitario');
            const esEtica = normCampo.includes('etica') && normCampo.includes('naturaleza') && normCampo.includes('sociedades');
            const usarVistaOficial = esCientifico || esHumano || esLenguajes || esEtica;

            configPrintSettings(usarVistaOficial);
            document.getElementById('printBtn').style.display = 'block';
            const pdfBtn = document.getElementById('downloadPdfBtn');
            
            if (usarVistaOficial) {
                pdfBtn.style.display = 'block';
                if (esLenguajes) {
                    renderVistaLenguajes(container, data, val, docenteSeleccionado);
                } else if (esEtica) {
                    renderVistaEtica(container, data, val, docenteSeleccionado);
                } else {
                    renderVistaOficial(container, data, val, docenteSeleccionado, esCientifico, esHumano);
                }
            } else {
                pdfBtn.style.display = 'none';

            container.className = 'planning-container';
            container.style.padding = "25px";
            
            const docenteFinal = docenteSeleccionado || val('Docente') || "No definido";

            let html = `
                ${getNavHtml()}
                <div class="header-container">
                    <div class="text-center mb-3 border-bottom pb-2">
                        <h2 class="text-primary mb-0">${val('Nombre del Proyecto')}</h2>
                        <h5 class="text-muted mb-1">${val('Disciplina')} - ${val('Grado')}</h5>
                        <span class="badge bg-secondary">${val('Fecha')}</span>
                    </div>
                    <img src="https://faustinohtb-hash.github.io/honorato/imagenes/logo_escuela.png" class="logo-absoluto" style="height: 50px; right: 10px;" alt="Logo Escuela">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="section-title" style="margin-top:0;">Información General</div>
                        <p><strong>Disciplina:</strong> ${val('Disciplina')}</p>
                        <p><strong>Grado:</strong> ${val('Grado')}</p>
                        <p><strong>Periodo:</strong> ${val('Temporalidad')}</p>
                        <p><strong>Docente:</strong> ${docenteFinal}</p>
                    </div>
                    <div class="col-md-6">
                        <div class="section-title" style="margin-top:0;">Relaciones</div>
                        <p><strong>Campo:</strong> ${val('Campo Formativo')}</p>
                        <p><strong>Ejes:</strong> ${val('Ejes Articuladores')}</p>
                    </div>
                </div>
                <div class="section-title">Fases STEAM</div>
            `;
            
            for (let i = 1; i <= 5; i++) {
                const m = val(`Momento ${i}  STEAM`);
                const keyAccionesAS = `Acciones ${i}  STEAM`;
                const a = val(keyAccionesAS); 
                const s = val(`Sesiones ${i}`);
                
                const aFormateada = formatearTextoFase(a); 

                if (m && a) {
                    html += `<div class="steam-phase"><h5>Fase ${i}: ${m}</h5><p><strong>Sesiones:</strong> ${s}</p><p>${aFormateada}</p></div>`;
                }
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
